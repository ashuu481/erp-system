<!DOCTYPE html>
<html>
<head>
<title>PDI Form</title>
<form method="POST" action="/generate_pdi">
    <input name="invoice_no" placeholder="Invoice No" required>
    <input name="part" placeholder="Part Name" required>
    <button type="submit">Generate PDI</button>
</form>
<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
input, select {
    padding:10px;
    margin:10px;
    width:250px;
    border-radius:6px;
    border:none;
}
button {
    padding:10px 20px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
}
</style>

</head>
<body>

<h2>📋 PDI Report</h2>

<form method="POST" action="/generate_pdi">

<input name="invoice_no" placeholder="Invoice No" required><br>
<input name="part" placeholder="Part Name" required><br>
<input name="qty" type="number" placeholder="Qty Checked" required><br>

<select name="status">
    <option>OK</option>
    <option>Not OK</option>
</select><br>

<input name="checked_by" placeholder="Checked By" required><br>

<button type="submit">Generate PDI</button>

</form>

</body>
</html>
