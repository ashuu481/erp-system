<!DOCTYPE html>
<html>
<head>
<title>Inward Entry</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

table {
    margin: auto;
    border-collapse: collapse;
    background: white;
    color: black;
}

th, td {
    border: 1px solid black;
    padding: 6px;
}

input {
    width: 100%;
    border: none;
    padding: 5px;
}

button {
    margin: 10px;
    padding: 8px 15px;
}
</style>
</head>

<body>

<h2>📥 Inward Entry</h2>

<form method="POST" action="/save_inward">

<table id="inwardTable">

<tr>
<th>Sr No</th>
<th>Part Description</th>
<th>Part No</th>
<th>Rate</th>
<th>Production Qty</th>
<th>WIP Qty</th>
<th>FG Qty</th>
<th>Total Stock</th>
</tr>

<tr>
<td><input name="sr[]"></td>
<td><input name="desc[]"></td>
<td><input name="part_no[]"></td>
<td><input name="rate[]"></td>
<td><input name="prod_qty[]"></td>
<td><input name="wip_qty[]"></td>
<td><input name="fg_qty[]"></td>
<td><input name="total[]"></td>
</tr>

</table>

<button type="button" onclick="addRow()">➕ Add Row</button>
<br>
<button type="submit">💾 Save</button>

</form>

<script>
function addRow() {
    let table = document.getElementById("inwardTable");
    let row = table.insertRow();

    row.innerHTML = `
        <td><input name="sr[]"></td>
        <td><input name="desc[]"></td>
        <td><input name="part_no[]"></td>
        <td><input name="rate[]"></td>
        <td><input name="prod_qty[]"></td>
        <td><input name="wip_qty[]"></td>
        <td><input name="fg_qty[]"></td>
        <td><input name="total[]"></td>
    `;
}
</script>

</body>
</html>
